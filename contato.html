<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Contato | Espaço Alvorar</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <header class="header">

        <div class="container">

            <a href="index.html" class="logo">

                Espaço Alvorar

            </a>

            <nav class="nav" id="nav">

                <a href="index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="agendamento.html">Agendamento</a>
                <a href="contato.html">Contato</a>

            </nav>

            <button id="menu-btn" class="menu-btn">

                ☰

            </button>

        </div>

    </header>

    <section class="page-banner">

        <div class="container">

            <h1>Entre em Contato</h1>

            <p>
                Estamos à disposição para tirar dúvidas.
            </p>

        </div>

    </section>

    <section class="contato-page">

        <div class="container">

            <div class="agendamento-grid">

                <div>

                    <div class="info-card">

                        <h3>Contato</h3>

                        <p>📞 (85) 99999-9999</p>

                        <p>📧 contato@espacoalvorar.com.br</p>

                        <p>📍 Fortaleza - CE</p>

                        <p>🕐 Seg a Sex: 08h às 18h</p>

                    </div>

                </div>

                <div>

                    <form>

                        <div class="input-group">

                            <label>Nome</label>

                            <input type="text">

                        </div>

                        <div class="input-group">

                            <label>Email</label>

                            <input type="email">

                        </div>

                        <div class="input-group">

                            <label>Mensagem</label>

                            <textarea rows="6"></textarea>

                        </div>

                        <button
                            type="submit"
                            class="btn-primary">

                            Enviar Mensagem

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <section>

        <div class="container">

            <h2>Localização</h2>

            <iframe
                src="https://www.google.com/maps/embed"
                width="100%"
                height="400"
                style="border:0;"
                loading="lazy">

            </iframe>

        </div>

    </section>

    <script src="js/menu.js"></script>

</body>

</html>
