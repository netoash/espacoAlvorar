<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login | Espaço Alvorar</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Espaço Alvorar</h1>

        <p>Área Administrativa</p>

        <form id="loginForm">

            <input
                type="email"
                placeholder="E-mail"
                required>

            <input
                type="password"
                placeholder="Senha"
                required>

            <button type="submit">

                Entrar

            </button>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
